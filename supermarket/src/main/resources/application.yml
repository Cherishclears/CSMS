server:
  port: 8080

spring:
  ai:
    openai:
      api-key: sk-77251b7578924688a6199833a89bd022
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat

  application:
    name: supermarket

  # Mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/supermarket?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto


# JWT配置
jwt:
  secret: supermarket-jwt-secret-key-must-be-at-least-256-bits-long
  expire: 86400000   # 24小时（毫秒）